<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resolved Family — Guided Walkthrough</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
<style>
:root {
  --navy: #0f172a;
  --deep: #0f172a;
  --gold: #D4A853;
  --green: #10B981;
  --red: #EF4444;
  --amber: #F59E0B;

  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --serif: 'Source Serif 4', Georgia, serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  font-family: var(--sans);
  background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
  color: #fff;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(88, 28, 135, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
  animation: meshDrift 15s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

@keyframes meshDrift {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(30px, -30px); }
  66% { transform: translate(-30px, 30px); }
}

body > * {
  position: relative;
  z-index: 1;
}

.glassmorphic,
.card-w,
.grouped,
.welcome,
.sintro,
.sdone,
.encourage,
.emo,
.sum,
.unlock {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06);
  border-radius: 12px;
  position: relative;
}

.card-w:hover,
.grouped:hover {
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08), 0 8px 32px rgba(0, 0, 0, 0.2);
}

@media (hover: hover) and (pointer: fine) {
  .card-w:hover,
  .grouped:hover {
    transform: perspective(1000px) rotateX(1deg) rotateY(-1deg) scale(1.02);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
}

/* STATUS DOCK - Gold dock nodes */
.status-dock {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 14px 24px;
  display: flex;
  gap: 16px;
  align-items: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.dock-nodes {
  display: flex;
  gap: 12px;
  align-items: center;
}

.dock-node {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.4);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}

.dock-node.active {
  background: rgba(212, 168, 83, 0.3);
  border-color: rgba(212, 168, 83, 0.8);
  color: var(--gold);
  box-shadow: 0 0 16px rgba(212, 168, 83, 0.4), inset 0 0 8px rgba(212, 168, 83, 0.2);
  animation: nodePulse 1.5s ease-in-out infinite;
}

@keyframes nodePulse {
  0%, 100% { box-shadow: 0 0 16px rgba(212, 168, 83, 0.4), inset 0 0 8px rgba(212, 168, 83, 0.2); }
  50% { box-shadow: 0 0 24px rgba(212, 168, 83, 0.6), inset 0 0 12px rgba(212, 168, 83, 0.3); }
}

.dock-node.completed {
  background: var(--gold);
  border-color: var(--gold);
  color: #0f172a;
  box-shadow: 0 0 12px rgba(212, 168, 83, 0.5);
}

/* PROGRESS BAR */
.pbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.pbar-in {
  max-width: 600px;
  margin: 0 auto;
  padding: 14px 24px;
}

.pbar-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.pbar-sec {
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
}

.pbar-pct {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.4);
}

.pbar-track {
  height: 4px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 100px;
  overflow: hidden;
  position: relative;
}

.pbar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #E8C36A, var(--gold));
  background-size: 200% 100%;
  border-radius: 100px;
  transition: width 0.5s ease;
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* WELCOME SCREEN */
.welcome {
  max-width: 560px;
  margin: 0 auto;
  padding: 80px 24px;
  text-align: center;
}

.welcome h1 {
  font-family: var(--serif);
  font-size: clamp(30px, 5vw, 48px);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #c0c0c0, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.welcome h1 span {
  background: linear-gradient(135deg, var(--gold), #C4933F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.welcome .quote {
  font-family: var(--serif);
  font-size: clamp(22px, 3.5vw, 28px);
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), #C4933F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-style: italic;
  margin: 20px auto;
  max-width: 400px;
  line-height: 1.3;
}

.welcome .body {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.6);
  line-height: 1.7;
  margin-bottom: 32px;
  max-width: 460px;
  margin-left: auto;
  margin-right: auto;
}

.w-steps {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 400px;
  margin: 0 auto 36px;
  text-align: left;
}

.w-step {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06);
  border-radius: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 14px 18px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.w-step:hover {
  transform: translateY(-2px);
  border-color: rgba(212, 168, 83, 0.3);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 8px 25px rgba(0, 0, 0, 0.2);
}

.w-step-n {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(212, 168, 83, 0.12);
  border: 1px solid rgba(212, 168, 83, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
}

.w-step-t {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.7);
}

.w-time {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 36px;
  flex-wrap: wrap;
}

.w-time span {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.4);
}

.w-time strong {
  color: rgba(255, 255, 255, 0.8);
}

/* SECTION INTRO */
.sintro {
  text-align: center;
  padding: 120px 24px 60px;
  max-width: 520px;
  margin: 0 auto;
}

.sintro .icon {
  font-size: 48px;
  margin-bottom: 16px;
  animation: iconFloat 3s ease-in-out infinite;
}

.sintro h2 {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 36px);
  font-weight: 700;
  margin-bottom: 12px;
  line-height: 1.2;
  background: linear-gradient(135deg, #c0c0c0, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sintro .sub {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.6;
  margin-bottom: 20px;
}

.sintro .reassure {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.35);
  font-style: italic;
  margin-bottom: 24px;
}

.sintro .privacy {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  padding: 10px 18px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06);
  border-radius: 12px;
  font-size: 15px;
  color: rgba(255, 255, 255, 0.4);
  margin-bottom: 32px;
}

.sintro .meta {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.25);
  margin-top: 12px;
}

/* SECTION COMPLETE */
.sdone {
  text-align: center;
  padding: 120px 24px 60px;
  max-width: 480px;
  margin: 0 auto;
}

.sdone .chk {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(16, 185, 129, 0.15);
  border: 2px solid rgba(16, 185, 129, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 28px;
  animation: checkPulse 2s ease-in-out infinite;
}

.sdone h2 {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
}

.sdone .pct {
  font-size: 17px;
  color: rgba(255, 255, 255, 0.45);
  margin-bottom: 32px;
}

@keyframes checkPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.2); }
  50% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
}

.halfway {
  display: inline-block;
  padding: 10px 22px;
  border-radius: 10px;
  background: rgba(212, 168, 83, 0.08);
  border: 1px solid rgba(212, 168, 83, 0.2);
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 24px;
  animation: halfwayPulse 2.5s ease-in-out infinite;
}

@keyframes halfwayPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212, 168, 83, 0.15); }
  50% { box-shadow: 0 0 20px rgba(212, 168, 83, 0.1); }
}

/* ENCOURAGEMENT */
.encourage {
  text-align: center;
  padding: 120px 24px 60px;
  max-width: 480px;
  margin: 0 auto;
}

.encourage h2 {
  font-family: var(--serif);
  font-size: clamp(24px, 4vw, 30px);
  font-weight: 700;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--gold), #C4933F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.encourage p {
  font-size: 17px;
  color: rgba(255, 255, 255, 0.55);
  margin-bottom: 28px;
}

/* CARDS */
.card-w {
  max-width: 580px;
  margin: 0 auto;
  padding: 100px 24px 120px;
}

.card-t {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), #C4933F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.card-h {
  font-size: 17px;
  color: rgba(255, 255, 255, 0.35);
  margin-bottom: 24px;
}

/* QUESTIONS */
.qb {
  margin-bottom: 28px;
}

.qb:last-child {
  margin-bottom: 0;
}

.ql {
  font-family: var(--sans);
  font-size: 21px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 12px;
  color: rgba(255, 255, 255, 0.85);
}

.qhint {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.35);
  margin-bottom: 10px;
  line-height: 1.5;
}

/* GROUPED */
.grouped {
  padding: 20px 18px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.grouped:hover {
  border-color: rgba(212, 168, 83, 0.2);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 8px 30px rgba(0, 0, 0, 0.2);
}

.grouped .qb {
  margin-bottom: 16px;
}

.grouped .qb:last-child {
  margin-bottom: 0;
}

.grouped .ql {
  font-size: 17px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.75);
  margin-bottom: 8px;
}

.gtitle {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
}

/* INPUTS */
.qi {
  width: 100%;
  font-family: var(--sans);
  font-size: 19px;
  padding: 18px 20px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  outline: none;
  transition: all 0.3s ease;
  backdrop-filter: blur(6px);
  position: relative;
  z-index: 2;
}

.qi:focus {
  border-color: rgba(212, 168, 83, 0.5);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 0 0 3px rgba(212, 168, 83, 0.1), 0 0 25px rgba(212, 168, 83, 0.08);
}

.qi::placeholder {
  color: rgba(255, 255, 255, 0.25);
}

textarea.qi {
  resize: vertical;
  min-height: 80px;
}

/* MULTIPLE CHOICE */
.mc {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.mc-o {
  padding: 16px 20px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 19px;
  line-height: 1.4;
  color: rgba(255, 255, 255, 0.8);
  position: relative;
  z-index: 2;
}

.mc-o:hover {
  border-color: rgba(212, 168, 83, 0.3);
  background: rgba(212, 168, 83, 0.06);
  box-shadow: 0 0 20px rgba(212, 168, 83, 0.12);
  transform: scale(0.98);
}

.mc-o.sel {
  border-color: rgba(212, 168, 83, 0.5);
  background: rgba(212, 168, 83, 0.12);
  color: var(--gold);
  box-shadow: 0 0 25px rgba(212, 168, 83, 0.15);
}

/* MULTI-SELECT */
.ms {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.ms-o {
  padding: 14px 20px;
  border-radius: 100px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 18px;
  color: rgba(255, 255, 255, 0.8);
  position: relative;
  z-index: 2;
}

.ms-o:hover {
  border-color: rgba(212, 168, 83, 0.3);
  box-shadow: 0 0 15px rgba(212, 168, 83, 0.1);
  transform: scale(0.98);
}

.ms-o.sel {
  border-color: rgba(212, 168, 83, 0.5);
  background: rgba(212, 168, 83, 0.15);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(212, 168, 83, 0.12);
}

/* YES/NO */
.yn {
  display: flex;
  gap: 10px;
}

.yn-o {
  flex: 1;
  padding: 18px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 19px;
  text-align: center;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.8);
  position: relative;
  z-index: 2;
}

.yn-o:hover {
  border-color: rgba(212, 168, 83, 0.3);
  box-shadow: 0 0 20px rgba(212, 168, 83, 0.12);
  transform: scale(0.96);
}

.yn-o.sel {
  border-color: rgba(212, 168, 83, 0.5);
  background: rgba(212, 168, 83, 0.12);
  color: var(--gold);
  box-shadow: 0 0 25px rgba(212, 168, 83, 0.15);
}

/* DATA FIELDS - New hybrid collection */
.data-field {
  margin-top: 16px;
  padding: 16px;
  border-radius: 10px;
  background: rgba(212, 168, 83, 0.08);
  border: 1px solid rgba(212, 168, 83, 0.2);
  animation: slideInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.data-field-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
}

.data-field .qi {
  margin-bottom: 12px;
}

.data-field .qi:last-child {
  margin-bottom: 0;
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* TIPS - Solution and Gap Tips */
.tip {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 16px;
  line-height: 1.5;
  animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.tip.solution {
  background: rgba(16, 185, 129, 0.1);
  border-left: 3px solid var(--green);
  color: rgba(16, 185, 129, 0.9);
}

.tip.gap {
  background: rgba(245, 158, 11, 0.1);
  border-left: 3px solid var(--amber);
  color: rgba(245, 158, 11, 0.9);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* CALLOUT BOX */
.callout-box {
  margin: 16px 0;
  padding: 14px 16px;
  border-radius: 10px;
  background: rgba(212, 168, 83, 0.12);
  border-left: 3px solid var(--gold);
  font-size: 16px;
  color: rgba(255, 255, 255, 0.8);
  line-height: 1.5;
  animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* TRIPLE SCORE DISPLAY */
.score-reveal {
  margin: 32px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.score-item {
  text-align: left;
}

.score-label {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.5);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.score-bar {
  height: 8px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 6px;
}

.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #E8C36A);
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.score-pct {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
}

/* EMOTIONAL CLOSE */
.emo {
  text-align: center;
  padding: 120px 24px 60px;
  max-width: 480px;
  margin: 0 auto;
}

.emo h2 {
  font-family: var(--serif);
  font-size: clamp(26px, 5vw, 34px);
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #c0c0c0, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.emo p {
  font-size: 17px;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.7;
  margin-bottom: 12px;
}

.emo-dove {
  animation: doveFloat 4s ease-in-out infinite;
}

@keyframes doveFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.emo-quote {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), #C4933F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-style: italic;
  margin: 24px 0 8px;
  line-height: 1.4;
}

.emo-quote-sub {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.45);
  margin-bottom: 32px;
}

/* SUMMARY */
.sum {
  max-width: 580px;
  margin: 0 auto;
  padding: 100px 24px 80px;
  text-align: center;
}

.sum-badge {
  display: inline-block;
  padding: 6px 18px;
  border-radius: 100px;
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid rgba(16, 185, 129, 0.25);
  font-size: 15px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.sum h1 {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #c0c0c0, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sum h1 span {
  background: linear-gradient(135deg, var(--gold), #C4933F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sum .sub {
  font-size: 17px;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.6;
  margin-bottom: 40px;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}

.stats {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.stat {
  flex: 1;
  min-width: 120px;
  max-width: 160px;
  padding: 20px 16px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(6px);
}

.stat:hover {
  transform: translateY(-3px);
  border-color: rgba(212, 168, 83, 0.15);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
}

.stat-n {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 700;
  color: var(--gold);
}

.stat-l {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.4);
  margin-top: 4px;
}

.ss {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  margin-bottom: 10px;
  font-size: 15px;
  color: rgba(255, 255, 255, 0.65);
  transition: all 0.3s ease;
}

.ss:hover {
  border-color: rgba(212, 168, 83, 0.2);
  background: rgba(212, 168, 83, 0.06);
}

/* FOLLOW-UP */
.fu {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 8px 14px;
  border-radius: 8px;
  background: none;
  border: 1px dashed rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.3);
  font-family: var(--sans);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.fu:hover {
  border-color: rgba(212, 168, 83, 0.3);
  color: rgba(255, 255, 255, 0.5);
}

.fu.on {
  border-color: rgba(245, 158, 11, 0.3);
  background: rgba(245, 158, 11, 0.06);
  color: #F59E0B;
  border-style: solid;
}

/* CONDITIONAL */
.cond {
  margin-top: 12px;
  padding-left: 16px;
  border-left: 2px solid rgba(212, 168, 83, 0.2);
}

/* NAVIGATION */
.nav {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.nb {
  flex: 1;
  padding: 20px 24px;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 19px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border: none;
  letter-spacing: 0.3px;
  position: relative;
  z-index: 2;
}

.nb-back {
  background: rgba(255, 255, 255, 0.06);
  color: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.nb-back:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow: 0 4px 20px rgba(255, 255, 255, 0.06);
}

.nb-next {
  position: relative;
  background: linear-gradient(135deg, var(--gold), #C4933F);
  color: var(--navy);
  font-weight: 700;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(212, 168, 83, 0.2);
}

.nb-next:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(212, 168, 83, 0.35), 0 0 50px rgba(212, 168, 83, 0.12);
}

/* CTA BUTTONS */
.cta {
  position: relative;
  display: inline-block;
  padding: 20px 44px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), #C4933F);
  color: var(--navy);
  font-family: var(--sans);
  font-size: 19px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing: 0.5px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(212, 168, 83, 0.2);
  z-index: 2;
}

.cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 35px rgba(212, 168, 83, 0.4), 0 0 60px rgba(212, 168, 83, 0.15);
}

.cta::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  transition: transform 0.4s ease, opacity 0.4s ease;
  pointer-events: none;
}

.cta:hover::after {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

/* STAGGER ANIMATION */
@keyframes staggerFade {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.stagger-item {
  animation: staggerFade 0.5s ease forwards;
}

.stagger-item:nth-child(1) { animation-delay: 0.05s; }
.stagger-item:nth-child(2) { animation-delay: 0.1s; }
.stagger-item:nth-child(3) { animation-delay: 0.15s; }
.stagger-item:nth-child(4) { animation-delay: 0.2s; }
.stagger-item:nth-child(5) { animation-delay: 0.25s; }
.stagger-item:nth-child(n+6) { animation-delay: 0.3s; }

/* SPOTLIGHT */
.spotlight-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: none;
  pointer-events: none;
  z-index: 98;
}

.spotlight-overlay .glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212, 168, 83, 0.1) 0%, transparent 70%);
  filter: blur(40px);
  pointer-events: none;
}

@media (max-width: 600px) {
  .pbar-sec {
    font-size: 13px;
  }
  .pbar-pct {
    font-size: 13px;
  }
  .dock-node {
    width: 24px;
    height: 24px;
    font-size: 9px;
  }
  .ql {
    font-size: 18px;
  }
  .mc-o {
    font-size: 17px;
  }
  .status-dock {
    bottom: 16px;
    padding: 10px 16px;
  }
}
</style>
</head>
<body>

<div id="app" style="background: #0f172a; min-height: 100vh;"></div>

<script>
// Load walkthrough from Jinja2
const _RAW_WALKTHROUGH = {{ walkthrough | safe }};

// Initialize app state
let currentSection = -1; // -1 = welcome screen
let currentCard = 0;
let answers = {};
let beforeScore = 0;
let currentScore = 0;
let projectedScore = 0;
let maxScore = 120;

// ─── Session ID from URL (set by SamCart redirect) ───
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('session_id') || localStorage.getItem('walkthrough_session_id');
if (sessionId) {
  localStorage.setItem('walkthrough_session_id', sessionId);
}

// Load saved answers from localStorage
function loadAnswers() {
  const saved = localStorage.getItem('walkthrough_answers');
  if (saved) {
    try {
      answers = JSON.parse(saved);
    } catch (e) {
      answers = {};
    }
  }
}

// Save answers to localStorage
function saveAnswers() {
  localStorage.setItem('walkthrough_answers', JSON.stringify(answers));
}

// Calculate scores
function calculateScores() {
  beforeScore = 0;
  currentScore = 0;
  let maxPoints = 0;

  _RAW_WALKTHROUGH.sections.forEach(section => {
    section.cards.forEach(card => {
      card.questions.forEach(q => {
        if (q.type === 'multiple_choice') {
          const ans = answers[q.id];
          const points = q.points;

          if (ans !== undefined) {
            beforeScore += points[ans];
            let score = points[ans];

            // Check if this question has data_fields and if any are filled
            if (q.data_fields && Array.isArray(q.data_fields)) {
              const anyFieldFilled = q.data_fields.some(df => {
                const fieldVal = answers[df.id];
                return fieldVal && fieldVal.trim().length > 0;
              });
              if (anyFieldFilled && score < 2) {
                score = 2;
              }
            }
            currentScore += score;
          }

          maxPoints += Math.max(...points);
        }
      });
    });
  });

  projectedScore = maxPoints;
  maxScore = maxPoints;
}

// Render welcome screen
function renderWelcome() {
  const w = _RAW_WALKTHROUGH.welcome;
  const stepsHtml = w.what_to_expect.map((step, i) => `
    <div class="w-step stagger-item">
      <div class="w-step-n">${i + 1}</div>
      <div class="w-step-t">${step.text}</div>
    </div>
  `).join('');

  const statsHtml = w.stats.map(stat => `<span><strong>${stat}</strong></span>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="welcome">
      <h1>${w.headline}</h1>
      <p class="body">${w.body}</p>
      <div class="w-steps">${stepsHtml}</div>
      <div class="w-time">${statsHtml}</div>
      <p class="body" style="font-size: 16px; margin-bottom: 24px;">${w.reassurance}</p>
      <button class="cta" onclick="nextSection();">${w.cta}</button>
      <p class="privacy">🔒 ${w.footer_note}</p>
    </div>
  `;
}

// Render section intro
function renderSectionIntro() {
  window.scrollTo(0, 0);
  const section = _RAW_WALKTHROUGH.sections[currentSection];
  const iconMap = {
    compass: '🧭',
    users: '👥',
    baby: '👶',
    heart: '❤️',
    bank: '🏦',
    shield: '🛡️',
    laptop: '💻',
    stethoscope: '🩺',
    document: '📄',
    star: '⭐'
  };

  const skipBtn = section.skippable
    ? `<button class="cta-secondary" onclick="skipSection();" style="margin-top:12px; background:transparent; border:1px solid rgba(255,255,255,0.3); color:rgba(255,255,255,0.7); padding:14px 32px; border-radius:12px; font-size:1rem; cursor:pointer;">Skip This Section</button>`
    : '';

  document.getElementById('app').innerHTML = `
    <div class="sintro">
      <div class="icon">${iconMap[section.icon] || '●'}</div>
      <h2>${section.title}</h2>
      <p class="sub">${section.subtitle}</p>
      <p class="reassure">${section.intro_message}</p>
      <div style="margin-top: 32px;">
        <button class="cta" onclick="nextCard();">Next</button>
        ${skipBtn}
      </div>
    </div>
  `;
}

// Render section complete
function renderSectionComplete() {
  const section = _RAW_WALKTHROUGH.sections[currentSection];
  const pct = Math.round((beforeScore / maxScore) * 100);

  document.getElementById('app').innerHTML = `
    <div class="sdone">
      <div class="chk">✓</div>
      <h2>${section.title}</h2>
      <p class="pct">${pct}% of this section complete</p>
      <button class="cta" onclick="nextSection();">Next Section</button>
    </div>
  `;
}

// Render card with questions
function renderCard() {
  window.scrollTo(0, 0);
  const section = _RAW_WALKTHROUGH.sections[currentSection];
  const card = section.cards[currentCard];

  let questionsHtml = '';

  card.questions.forEach((q, qIdx) => {
    let qHtml = `
      <div class="qb" id="question-${q.id}">
        <div class="ql">${q.prompt}</div>
    `;

    if (q.type === 'multiple_choice') {
      const selected = answers[q.id];
      qHtml += `<div class="mc">`;
      q.options.forEach((opt, optIdx) => {
        const isSelected = selected === optIdx ? ' sel' : '';
        qHtml += `
          <div class="mc-o${isSelected}" onclick="selectAnswer('${q.id}', ${optIdx}, this);">
            ${opt}
          </div>
        `;
      });
      qHtml += `</div>`;

      // Add callout if present
      if (q.callout) {
        qHtml += `<div class="callout-box">${q.callout}</div>`;
      }
    } else if (q.type === 'text' || q.type === 'textarea') {
      const val = answers[q.id] || '';
      const tag = q.type === 'text' ? 'input' : 'textarea';
      const inputType = q.type === 'text' ? 'type="text"' : '';
      qHtml += `
        <${tag} class="qi" ${inputType} placeholder="${q.placeholder || ''}"
          onchange="answers['${q.id}'] = this.value; saveAnswers();"
          value="${val}"></${tag}>
      `;
    } else if (q.type === 'yes_no') {
      const selected = answers[q.id];
      qHtml += `<div class="yn">
        <div class="yn-o${selected === true ? ' sel' : ''}" onclick="selectAnswer('${q.id}', true, this);">Yes</div>
        <div class="yn-o${selected === false ? ' sel' : ''}" onclick="selectAnswer('${q.id}', false, this);">No</div>
      </div>`;
    } else if (q.type === 'multi_select') {
      const selected = answers[q.id] || [];
      qHtml += `<div class="ms">`;
      q.options.forEach((opt, optIdx) => {
        const isSelected = selected.includes(optIdx) ? ' sel' : '';
        qHtml += `
          <div class="ms-o${isSelected}" onclick="toggleMultiSelect('${q.id}', ${optIdx}, this);">
            ${opt}
          </div>
        `;
      });
      qHtml += `</div>`;
    }

    qHtml += `</div>`;
    questionsHtml += qHtml;
  });

  const cardNavHtml = `
    <div class="nav">
      <button class="nb nb-back" onclick="prevCard();">← Back</button>
      <button class="nb nb-next" onclick="nextCard();">Next →</button>
    </div>
  `;

  document.getElementById('app').innerHTML = `
    <div class="card-w">
      <div class="card-t">${card.card_title}</div>
      <div class="card-h">Answer what you know. Skip what you don't.</div>
      ${questionsHtml}
      ${cardNavHtml}
    </div>
  `;

  // Restore answers to DOM and show data fields
  card.questions.forEach(q => {
    if ((q.type === 'text' || q.type === 'textarea') && answers[q.id]) {
      const input = document.querySelector(`[value="${answers[q.id]}"]`);
      if (input) input.value = answers[q.id];
    }

    // Show data fields for answered questions
    if (q.type === 'multiple_choice' && answers[q.id] !== undefined && q.data_fields) {
      showDataFields(q.id, answers[q.id], q.data_fields);
    }

    // Show tips for answered questions
    if (q.type === 'multiple_choice' && answers[q.id] !== undefined) {
      showTips(q.id, answers[q.id], q);
    }
  });
}

// Show data fields when question is answered
function showDataFields(questionId, selectedIndex, dataFields) {
  const questionEl = document.getElementById(`question-${questionId}`);
  if (!questionEl) return;

  // Remove existing data fields
  const existing = questionEl.querySelector('.data-field');
  if (existing) existing.remove();

  const fieldsToShow = dataFields.filter(df => df.show_if_option.includes(selectedIndex));

  if (fieldsToShow.length > 0) {
    let dataFieldHtml = '<div class="data-field">';
    fieldsToShow.forEach(df => {
      const val = answers[df.id] || '';
      const tag = df.type === 'text' ? 'input' : 'textarea';
      const inputType = df.type === 'text' ? 'type="text"' : '';
      dataFieldHtml += `
        <div class="data-field-label">${df.prompt}</div>
        <${tag} class="qi" ${inputType} placeholder="${df.placeholder || ''}"
          onchange="answers['${df.id}'] = this.value; saveAnswers(); calculateScores();"
          value="${val}"></${tag}>
      `;
    });
    dataFieldHtml += '</div>';

    const mc = questionEl.querySelector('.mc');
    if (mc) {
      mc.insertAdjacentHTML('afterend', dataFieldHtml);
    }
  }
}

// Show solution or gap tips
function showTips(questionId, selectedIndex, question) {
  const questionEl = document.getElementById(`question-${questionId}`);
  if (!questionEl) return;

  const existing = questionEl.querySelector('.tip');
  if (existing) existing.remove();

  const points = question.points[selectedIndex];
  let tipHtml = '';

  if (points >= 2 && question.solution_tip) {
    tipHtml = `<div class="tip solution">${question.solution_tip}</div>`;
  } else if (points <= 1 && question.gap_tip) {
    tipHtml = `<div class="tip gap">${question.gap_tip}</div>`;
  }

  if (tipHtml) {
    const mc = questionEl.querySelector('.mc') || questionEl.querySelector('.yn');
    if (mc) {
      mc.insertAdjacentHTML('afterend', tipHtml);
    }
  }
}

// Handle answer selection
function selectAnswer(questionId, selectedIndex, el) {
  answers[questionId] = selectedIndex;
  saveAnswers();
  calculateScores();

  // Update UI
  const qElement = document.getElementById(`question-${questionId}`);
  qElement.querySelectorAll('.mc-o, .yn-o').forEach(opt => opt.classList.remove('sel'));
  el.classList.add('sel');

  // Show data fields and tips
  const question = findQuestion(questionId);
  if (question.data_fields) {
    showDataFields(questionId, selectedIndex, question.data_fields);
  }
  showTips(questionId, selectedIndex, question);

  hapticFeedback();
}

// Toggle multi-select answer
function toggleMultiSelect(questionId, optionIndex, el) {
  if (!answers[questionId]) answers[questionId] = [];
  const idx = answers[questionId].indexOf(optionIndex);
  if (idx > -1) {
    answers[questionId].splice(idx, 1);
  } else {
    answers[questionId].push(optionIndex);
  }
  saveAnswers();
  el.classList.toggle('sel');
  hapticFeedback();
}

// Find question by ID
function findQuestion(questionId) {
  for (let section of _RAW_WALKTHROUGH.sections) {
    for (let card of section.cards) {
      for (let q of card.questions) {
        if (q.id === questionId) return q;
      }
    }
  }
  return null;
}

// Smooth screen transition — prevents white flash
function transitionScreen(renderFn) {
  const app = document.getElementById('app');
  app.style.opacity = '0';
  app.style.transition = 'opacity 0.15s ease';
  setTimeout(() => {
    renderFn();
    app.style.opacity = '1';
  }, 150);
}

// Navigation
function nextCard() {
  const section = _RAW_WALKTHROUGH.sections[currentSection];
  if (currentCard < section.cards.length - 1) {
    currentCard++;
    transitionScreen(() => renderCard());
  } else {
    transitionScreen(() => renderSectionComplete());
  }
  updateProgressBar();
}

function skipSection() {
  if (currentSection < _RAW_WALKTHROUGH.sections.length - 1) {
    currentSection++;
    currentCard = -1;
    transitionScreen(() => renderSectionIntro());
  } else {
    transitionScreen(() => renderEmotionalClose());
  }
  updateProgressBar();
}

function prevCard() {
  if (currentCard > 0) {
    currentCard--;
    renderCard();
  }
  updateProgressBar();
}

function nextSection() {
  if (currentSection === -1) {
    currentSection = 0;
    currentCard = -1;
    transitionScreen(() => renderSectionIntro());
  } else if (currentCard === -1) {
    currentCard = 0;
    transitionScreen(() => renderCard());
  } else if (currentSection < _RAW_WALKTHROUGH.sections.length - 1) {
    currentSection++;
    currentCard = -1;
    transitionScreen(() => renderSectionIntro());
  } else {
    transitionScreen(() => renderEmotionalClose());
  }
  updateProgressBar();
}

// Render emotional close screen
function renderEmotionalClose() {
  window.scrollTo(0, 0);
  calculateScores();
  const ec = _RAW_WALKTHROUGH.emotional_close;

  const beforePct = Math.round((beforeScore / maxScore) * 100);
  const currentPct = Math.round((currentScore / maxScore) * 100);
  const projectedPct = 100;

  let scoreHtml = `
    <div class="score-reveal">
      <div class="score-item">
        <div class="score-label">${ec.score_reveal.before_intro}</div>
        <div class="score-bar">
          <div class="score-bar-fill" style="width: ${beforePct}%"></div>
        </div>
        <div class="score-pct">${beforePct}%</div>
      </div>
      <div class="score-item">
        <div class="score-label">${ec.score_reveal.current_intro}</div>
        <div class="score-bar">
          <div class="score-bar-fill" style="width: ${currentPct}%"></div>
        </div>
        <div class="score-pct">${currentPct}%</div>
      </div>
      <div class="score-item">
        <div class="score-label">${ec.score_reveal.projected_intro}</div>
        <div class="score-bar">
          <div class="score-bar-fill" style="width: ${projectedPct}%"></div>
        </div>
        <div class="score-pct">${projectedPct}% ${ec.score_reveal.projected_close}</div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = `
    <div class="emo">
      <h2>${ec.headline}</h2>
      <p>${ec.body}</p>
      ${scoreHtml}
      <div class="emo-quote">"${ec.quote}"</div>
      <div class="emo-quote-sub">${ec.quote_sub}</div>
      <button class="cta" id="generate-brief-btn" onclick="generateBrief();">${ec.cta}</button>
      <div id="brief-status" style="margin-top:1rem;"></div>
    </div>
  `;
}

// ─── Generate Brief — POST answers to backend, trigger PDF + email ───
async function generateBrief() {
  const btn = document.getElementById('generate-brief-btn');
  const statusEl = document.getElementById('brief-status');

  if (!sessionId) {
    statusEl.innerHTML = '<p style="color:#e8927c;">Session not found. Please contact support or check your email for instructions.</p>';
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.textContent = 'Generating your brief...';
  btn.style.opacity = '0.7';
  statusEl.innerHTML = '<p style="color:#c9b458;">This takes about 60 seconds — we\'re building your personalized report with AI.</p>';

  try {
    const response = await fetch(`/api/session/${sessionId}/generate-brief`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: answers }),
    });

    const result = await response.json();

    if (result.status === 'success' || result.status === 'already_generated') {
      btn.textContent = 'Brief sent!';
      btn.style.background = '#2a6041';
      statusEl.innerHTML = `
        <p style="color:#c9b458; font-size:1.1rem; font-weight:600;">
          ✓ ${result.message || 'Your Resolved Brief is on its way to your inbox!'}
        </p>
        <p style="color:#a0aec0; margin-top:0.5rem;">Check your email (and spam folder) in the next few minutes.</p>
      `;
    } else {
      throw new Error(result.message || result.detail || 'Generation failed');
    }
  } catch (err) {
    console.error('Generate brief error:', err);
    btn.textContent = 'Try Again';
    btn.disabled = false;
    btn.style.opacity = '1';
    statusEl.innerHTML = `<p style="color:#e8927c;">Something went wrong: ${err.message}. Please try again or contact support.</p>`;
  }
}

// Update progress bar
function updateProgressBar() {
  let totalQuestions = 0;
  let answeredQuestions = 0;

  _RAW_WALKTHROUGH.sections.forEach(section => {
    section.cards.forEach(card => {
      card.questions.forEach(q => {
        totalQuestions++;
        if (answers[q.id] !== undefined) {
          answeredQuestions++;
        }
      });
    });
  });

  const pct = Math.round((answeredQuestions / totalQuestions) * 100);

  // Update dock if it exists
  const dock = document.querySelector('.dock-node.active');
  if (dock) {
    dock.classList.remove('active');
  }
  const nodes = document.querySelectorAll('.dock-node');
  if (nodes[currentSection]) {
    nodes[currentSection].classList.add('active');
  }

  // Update progress bar
  const pbarFill = document.querySelector('.pbar-fill');
  if (pbarFill) {
    pbarFill.style.width = pct + '%';
  }
}

// Haptic feedback
function hapticFeedback() {
  if ('vibrate' in navigator) {
    navigator.vibrate(20);
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  loadAnswers();
  calculateScores();
  renderWelcome();

  // Initialize interactive effects
  initTilt();
  initMagneticButtons();
  initSpotlight();
});

// 3D Tilt Effect for cards on desktop
function initTilt() {
  const isTouchDevice = () => (('ontouchstart' in window) || (navigator.maxTouchPoints > 0));
  if (isTouchDevice()) return;

  document.addEventListener('mousemove', function(e) {
    document.querySelectorAll('.card-w, .grouped').forEach(card => {
      const rect = card.getBoundingClientRect();
      const isWithinBounds = e.clientX >= rect.left && e.clientX <= rect.right &&
                            e.clientY >= rect.top && e.clientY <= rect.bottom;

      if (isWithinBounds) {
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const rotateX = Math.max(-1.5, Math.min(1.5, ((e.clientY - centerY) / rect.height) * 1.5));
        const rotateY = Math.max(-1.5, Math.min(1.5, ((centerX - e.clientX) / rect.width) * 1.5));
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
      }
    });
  });

  document.addEventListener('mouseleave', function() {
    document.querySelectorAll('.card-w, .grouped').forEach(card => {
      card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
    });
  });
}

// Magnetic button effect
function initMagneticButtons() {
  const isTouchDevice = () => (('ontouchstart' in window) || (navigator.maxTouchPoints > 0));
  if (isTouchDevice()) return;

  document.addEventListener('mousemove', function(e) {
    document.querySelectorAll('.cta, .nb-next').forEach(btn => {
      const rect = btn.getBoundingClientRect();
      const btnCenterX = rect.left + rect.width / 2;
      const btnCenterY = rect.top + rect.height / 2;

      const distX = e.clientX - btnCenterX;
      const distY = e.clientY - btnCenterY;
      const distance = Math.sqrt(distX * distX + distY * distY);

      if (distance < 100) {
        const moveX = (distX / distance) * 4;
        const moveY = (distY / distance) * 4;
        btn.style.transform = `translate(${moveX}px, ${moveY}px)`;
      } else {
        btn.style.transform = 'translate(0, 0)';
      }
    });
  });
}

// Spotlight effect
function initSpotlight() {
  const isTouchDevice = () => (('ontouchstart' in window) || (navigator.maxTouchPoints > 0));
  if (isTouchDevice()) return;

  document.addEventListener('mousemove', function(e) {
    const glows = document.querySelectorAll('.spotlight-overlay .glow');
    glows.forEach(glow => {
      glow.style.left = (e.clientX - 200) + 'px';
      glow.style.top = (e.clientY - 200) + 'px';
    });
  });
}
